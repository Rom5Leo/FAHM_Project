# config.yaml — the NUMBERS layer. If you change an experiment, you should
# only need to touch this file. Loaded by preprocessing.load_config().

paths:
  raw_csv: "data/raw/MetroPT3(AirCompressor).csv"   # quoted: contains ( )
  processed: data/processed/sensor_readings.parquet   # D11
  failure_windows: data/processed/failure_windows.csv
  figures: docs/figures/

preprocessing:
  expected_interval_seconds: 10   # modal interval, measured: 1,337,521 of ~1.5M steps (step 2)
  gap_threshold_seconds: 60       # jitter observed up to ~22s; 60 = 6x expected, clearly
                                  # beyond jitter, clearly below real holes (minutes-hours).
                                  # Revisit in step 4 when find_gaps shows the inventory.

checks:
  # Analog plausibility ranges: "sensor broken / physically impossible"
  # tripwires — NOT anomaly detection (that's the model's job later).
  # Rule: observed 7-month extreme (step 3 describe) + margin, reason inline.
  analog_ranges:
    - {sensor: TP2, min: -0.1, max: 12}           # obs -0.032..10.676; negative = zero-offset (D06)
    - {sensor: TP3, min: 0.0, max: 12}            # obs 0.730..10.302; 0 floor: full depressurization is legitimate
    - {sensor: H1, min: -0.1, max: 12}            # obs -0.036..10.288; same offset family as TP2
    - {sensor: DV_pressure, min: -0.1, max: 12}   # obs -0.032..9.844; the 9.8 max is VERIFIED REAL (Apr 6) -> ceiling clears it
    - {sensor: Reservoirs, min: 0.0, max: 12}     # obs 0.712..10.300; mirrors TP3
    - {sensor: Oil_temperature, min: 0.0, max: 110}  # obs 15.4..89.05; <0 C oil implausible in service; 110 above worst plausible overheat
    - {sensor: Motor_current, min: -0.05, max: 15}   # obs 0.020..9.295; negative current impossible (tiny offset allowance); 15 clears any inrush
  tp3_reservoirs_eps: 0.01     # mean|TP3-Reservoirs|; 5x observed mean 0.0019 (step 3)
  tp3_reservoirs_max: 0.5      # single-sample tripwire; observed max 0.182
  valve_antiphase_eps: 0.02    # |mean(COMP+DV_eletric) - 1|; observed sum 0.998 (step 3)

failure_windows:
  # Source: failure report table in the Kaggle dataset's PDF documentation
  # dates load as strings; parsed in code
  # F2 maintenance reads 30Apr in source — precedes the failure; likely typo for 30May, recorded as-is
  # NB: source table numbering reads #1,#1,#3,#4 — second row assumed typo for #2.
  - {failure_id: F1, fault_type: air_leak, start: 2020-04-18 00:00, end: 2020-04-18 23:59, maintenance: null}          # no report entry
  - {failure_id: F2, fault_type: air_leak, start: 2020-05-29 23:30, end: 2020-05-30 06:00, maintenance: 2020-04-30 12:00}
  - {failure_id: F3, fault_type: air_leak, start: 2020-06-05 10:00, end: 2020-06-07 14:30, maintenance: 2020-06-08 16:00}
  - {failure_id: F4, fault_type: air_leak, start: 2020-07-15 14:30, end: 2020-07-15 19:00, maintenance: 2020-07-16 00:00}
